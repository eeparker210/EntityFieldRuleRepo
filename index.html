<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Listing Status</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: #f0f0f4; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    const GoogleIcon = () => (
      <svg width="14" height="14" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
    );

    const SparkleIcon = ({ color = "#5A58F2", size = 15 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none">
        <path d="M12 2L13.5 8.5L20 10L13.5 11.5L12 18L10.5 11.5L4 10L10.5 8.5L12 2Z" fill={color}/>
        <path d="M19 14L19.75 17.25L23 18L19.75 18.75L19 22L18.25 18.75L15 18L18.25 17.25L19 14Z" fill={color} opacity="0.6"/>
        <path d="M5 3L5.5 5.5L8 6L5.5 6.5L5 9L4.5 6.5L2 6L4.5 5.5L5 3Z" fill={color} opacity="0.4"/>
      </svg>
    );

    const ImageThumbnail = ({ wide }) => (
      <div style={{
        width: wide ? 96 : 72, height: wide ? 54 : 72,
        borderRadius: 6,
        background: "linear-gradient(135deg, #d1d5e8 0%, #b0b4cc 100%)",
        display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
        border: "1px solid #dde0ee", flexShrink: 0, overflow: "hidden",
      }}>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" style={{ opacity: 0.5 }}>
          <rect x="3" y="3" width="18" height="18" rx="2" stroke="#fff" strokeWidth="1.5"/>
          <circle cx="8.5" cy="8.5" r="1.5" fill="#fff"/>
          <path d="M21 15l-5-5L5 21" stroke="#fff" strokeWidth="1.5" strokeLinejoin="round"/>
        </svg>
        {wide && <span style={{ fontSize: 8, color: "#fff", opacity: 0.7, marginTop: 2, fontWeight: 600 }}>16:9</span>}
      </div>
    );

    const Spinner = () => (
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" style={{ animation: "spin 0.8s linear infinite" }}>
        <circle cx="12" cy="12" r="10" stroke="#c7c6fb" strokeWidth="3"/>
        <path d="M12 2a10 10 0 0 1 10 10" stroke="#5A58F2" strokeWidth="3" strokeLinecap="round"/>
      </svg>
    );

    function ListingPanel() {
      const [resolveState, setResolveState] = useState("default");
      const [syncedWithPublisher, setSyncedWithPublisher] = useState(true);

      const handleSmartResolve = () => {
        setResolveState("loading");
        setTimeout(() => setResolveState("review"), 2200);
      };

      const handleAccept = () => {
        setResolveState(syncedWithPublisher ? "synced" : "pending");
      };

      const fieldRows = [
        { label: "Entity ID",    value: <a href="#" style={{ color: "#5A58F2", textDecoration: "none", fontSize: 13 }}>3583568843350995162</a> },
        { label: "Publisher",    value: <span style={{ display: "inline-flex", alignItems: "center", gap: 6, background: "#f5f5f8", border: "1px solid #e4e4ea", borderRadius: 6, padding: "4px 10px", fontSize: 13, fontWeight: 500, color: "#333" }}><GoogleIcon /> Google Business Profile</span> },
        { label: "Status",       value: <span style={{ display: "flex", alignItems: "center", gap: 6, color: "#b45309", fontWeight: 500, fontSize: 14 }}>⚠️ Not Synced</span> },
        { label: "Open Issues",  value: "2 Issues" },
        { label: "Last Updated", value: "Oct 24, 2025, 2:15 AM EDT" },
      ];

      return (
        <div style={{ fontFamily: "'DM Sans', sans-serif", background: "#f0f0f4", minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: 24 }}>
          <div style={{ background: "#fff", borderRadius: 12, width: "100%", maxWidth: 596, boxShadow: "0 4px 24px rgba(0,0,0,0.10)", overflow: "hidden" }}>

            {/* Header */}
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "20px 24px 16px", borderBottom: "1px solid #ebebf0" }}>
              <span style={{ fontSize: 17, fontWeight: 600, color: "#111" }}>Liam's Flower Shop</span>
              <div style={{ display: "flex", gap: 16 }}>
                {["···", "✕"].map(s => (
                  <button key={s} style={{ background: "none", border: "none", cursor: "pointer", color: "#888", fontSize: 17 }}>{s}</button>
                ))}
              </div>
            </div>

            {/* Prototype toggle */}
            <div style={{ background: "#fffbeb", borderBottom: "1px solid #fde68a", padding: "8px 24px", display: "flex", alignItems: "center", gap: 10, fontSize: 12, color: "#92400e" }}>
              <span style={{ fontWeight: 600 }}>Prototype toggle:</span>
              <span>Synced with publisher?</span>
              <button
                onClick={() => setSyncedWithPublisher(s => !s)}
                style={{ background: syncedWithPublisher ? "#5A58F2" : "#e5e7eb", border: "none", borderRadius: 12, width: 36, height: 20, cursor: "pointer", position: "relative", transition: "background 0.2s", flexShrink: 0 }}
              >
                <span style={{ position: "absolute", top: 3, left: syncedWithPublisher ? 18 : 3, width: 14, height: 14, borderRadius: "50%", background: "#fff", transition: "left 0.2s", display: "block" }} />
              </button>
              <span style={{ fontWeight: 500 }}>{syncedWithPublisher ? "Yes" : "No"}</span>
            </div>

            {/* Tabs */}
            <div style={{ display: "flex", padding: "0 24px", borderBottom: "1px solid #ebebf0" }}>
              {["Status", "Field Accuracy"].map((t, i) => (
                <div key={t} style={{ fontSize: 14, fontWeight: 500, padding: "14px 0", marginRight: 24, cursor: "pointer", color: i === 0 ? "#111" : "#888", borderBottom: i === 0 ? "2px solid #5A58F2" : "2px solid transparent" }}>{t}</div>
              ))}
            </div>

            {/* Fields */}
            <div style={{ padding: "8px 24px 4px" }}>
              {fieldRows.map(({ label, value }) => (
                <div key={label} style={{ display: "flex", alignItems: "center", padding: "13px 0", borderBottom: "1px solid #f2f2f5", fontSize: 14 }}>
                  <span style={{ width: 130, color: "#888", flexShrink: 0 }}>{label}</span>
                  <span style={{ color: "#111" }}>{value}</span>
                </div>
              ))}
            </div>

            {/* Issues */}
            <div style={{ padding: "20px 24px 24px", borderTop: "1px solid #ebebf0" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 15, fontWeight: 600, color: "#d93025", marginBottom: 20 }}>
                ⊙ Issues
              </div>

              {/* Issue 1 */}
              <div style={{ marginBottom: 20 }}>
                <div style={{ fontSize: 14, fontWeight: 600, color: "#111", marginBottom: 4 }}>Linked Account Issue</div>
                <div style={{ fontSize: 13.5, color: "#444", lineHeight: 1.5, marginBottom: 10 }}>The Google Account ID has not been provided for this entity or is invalid.</div>
                <div style={{ borderLeft: "3px solid #5A58F2", padding: "12px 14px", background: "#fafafe", borderRadius: "0 6px 6px 0", marginBottom: 12 }}>
                  <div style={{ fontSize: 13, fontWeight: 600, color: "#111", marginBottom: 4 }}>Solution</div>
                  <div style={{ fontSize: 13, color: "#555", lineHeight: 1.55 }}>If you have provided an Account ID, navigate to Knowledge Graph, and make sure the Google Account ID is correct in the Internal Use Only section. If you have not provided an Account ID,…</div>
                  <button style={{ background: "none", border: "none", color: "#5A58F2", fontSize: 13, fontWeight: 500, cursor: "pointer", padding: 0, marginTop: 6 }}>Show More</button>
                </div>
                <div style={{ display: "flex", justifyContent: "flex-end" }}>
                  <button style={{ background: "#fff", border: "1px solid #d0d0da", borderRadius: 6, padding: "7px 16px", fontSize: 13, fontWeight: 500, color: "#333", cursor: "pointer" }}>Fix Listing</button>
                </div>
              </div>

              <div style={{ height: 1, background: "#ebebf0", margin: "0 0 20px" }} />

              {/* Issue 2 — Publisher Limitation */}
              {resolveState === "synced" ? (
                <div style={{ animation: "fadeIn 0.3s ease", background: "#f0fdf4", border: "1.5px solid #86efac", borderRadius: 8, padding: "12px 14px", display: "flex", alignItems: "flex-start", gap: 10 }}>
                  <span style={{ fontSize: 16, marginTop: 1 }}>✅</span>
                  <div>
                    <div style={{ fontSize: 13, fontWeight: 600, color: "#166534" }}>Publisher Limitation resolved</div>
                    <div style={{ fontSize: 12.5, color: "#166534", opacity: 0.8, marginTop: 3, lineHeight: 1.5 }}>storefront.jpg (1600 × 900 px) has synced successfully with Google Business Profile.</div>
                  </div>
                </div>
              ) : (
                <div>
                  <div style={{ fontSize: 14, fontWeight: 600, color: "#111", marginBottom: 4 }}>Publisher Limitation</div>
                  <div style={{ fontSize: 13.5, color: "#444", lineHeight: 1.5, marginBottom: 10 }}>We are unable to update your Google Business Profile Cover Photo due to an invalid aspect ratio or pixel size.</div>
                  <div style={{ borderLeft: "3px solid #5A58F2", padding: "12px 14px", background: "#fafafe", borderRadius: "0 6px 6px 0", marginBottom: 12 }}>
                    <div style={{ fontSize: 13, fontWeight: 600, color: "#111", marginBottom: 4 }}>Solution</div>
                    <div style={{ fontSize: 13, color: "#555", lineHeight: 1.55 }}>Navigate to Knowledge Graph, edit your Google Cover Photo to meet the required aspect ratio (16:9) or pixel requirement of min 480x 270px, and re-upload it to the platform.</div>
                  </div>

                  {resolveState === "default" && (
                    <div style={{ display: "flex", justifyContent: "flex-end" }}>
                      <button onClick={handleSmartResolve} style={{ display: "inline-flex", alignItems: "center", gap: 7, background: "#fff", border: "1.5px solid #5A58F2", borderRadius: 6, padding: "7px 16px", fontSize: 13, fontWeight: 500, color: "#5A58F2", cursor: "pointer" }}>
                        <SparkleIcon /> Smart Resolve
                      </button>
                    </div>
                  )}

                  {resolveState === "loading" && (
                    <div style={{ display: "flex", justifyContent: "flex-end" }}>
                      <button disabled style={{ display: "inline-flex", alignItems: "center", gap: 8, background: "#fff", border: "1.5px solid #c7c6fb", borderRadius: 6, padding: "7px 16px", fontSize: 13, fontWeight: 500, color: "#9896f5", cursor: "not-allowed" }}>
                        <Spinner /> Resolving…
                      </button>
                    </div>
                  )}

                  {resolveState === "review" && (
                    <div style={{ animation: "fadeIn 0.3s ease", border: "1.5px solid #5A58F2", borderRadius: 8, overflow: "hidden" }}>
                      <div style={{ background: "#f3f3ff", padding: "10px 14px", display: "flex", alignItems: "center", gap: 8, borderBottom: "1px solid #dddcfb" }}>
                        <SparkleIcon size={13} />
                        <span style={{ fontSize: 13, fontWeight: 600, color: "#5A58F2" }}>Smart Resolve Suggestion</span>
                        <span style={{ marginLeft: "auto", fontSize: 12, color: "#888" }}>Review before applying</span>
                      </div>
                      <div style={{ padding: "14px 14px 10px", display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                        <div>
                          <div style={{ fontSize: 11, fontWeight: 600, color: "#888", textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 8 }}>Before</div>
                          <div style={{ display: "flex", gap: 10, alignItems: "flex-start" }}>
                            <ImageThumbnail wide={false} />
                            <div style={{ fontSize: 12.5, color: "#444", lineHeight: 1.6 }}>
                              <div style={{ fontWeight: 600, color: "#111" }}>storefront.jpg</div>
                              <div style={{ color: "#c0392b", fontWeight: 500 }}>4000 × 3000 px</div>
                              <div style={{ color: "#888" }}>Ratio: 4:3</div>
                            </div>
                          </div>
                        </div>
                        <div>
                          <div style={{ fontSize: 11, fontWeight: 600, color: "#888", textTransform: "uppercase", letterSpacing: "0.06em", marginBottom: 8 }}>After</div>
                          <div style={{ display: "flex", gap: 10, alignItems: "flex-start" }}>
                            <ImageThumbnail wide={true} />
                            <div style={{ fontSize: 12.5, color: "#444", lineHeight: 1.6 }}>
                              <div style={{ fontWeight: 600, color: "#111" }}>storefront.jpg</div>
                              <div style={{ color: "#27ae60", fontWeight: 500 }}>1600 × 900 px</div>
                              <div style={{ color: "#888" }}>Ratio: 16:9</div>
                            </div>
                          </div>
                        </div>
                      </div>
                      <div style={{ display: "flex", justifyContent: "flex-end", gap: 8, padding: "10px 14px 14px" }}>
                        <button onClick={() => setResolveState("declined")} style={{ background: "#fff", border: "1.5px solid #e74c3c", borderRadius: 6, padding: "7px 16px", fontSize: 13, fontWeight: 500, color: "#e74c3c", cursor: "pointer" }}>Decline</button>
                        <button onClick={handleAccept} style={{ background: "#5A58F2", border: "1.5px solid #5A58F2", borderRadius: 6, padding: "7px 16px", fontSize: 13, fontWeight: 500, color: "#fff", cursor: "pointer" }}>Accept Suggestion</button>
                      </div>
                    </div>
                  )}

                  {resolveState === "pending" && (
                    <div style={{ animation: "fadeIn 0.3s ease", background: "#fffbeb", border: "1.5px solid #fde68a", borderRadius: 8, padding: "12px 14px", display: "flex", alignItems: "flex-start", gap: 10 }}>
                      <span style={{ fontSize: 16, marginTop: 1 }}>🕐</span>
                      <div>
                        <div style={{ fontSize: 13, fontWeight: 600, color: "#92400e" }}>Change applied — sync pending</div>
                        <div style={{ fontSize: 12.5, color: "#b45309", marginTop: 3, lineHeight: 1.5 }}>storefront.jpg has been updated to 1600 × 900 px. Check back soon to confirm it has synced with Google Business Profile.</div>
                      </div>
                    </div>
                  )}

                  {resolveState === "declined" && (
                    <div style={{ animation: "fadeIn 0.3s ease", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                      <span style={{ fontSize: 13, color: "#888" }}>Suggestion declined.</span>
                      <button onClick={() => setResolveState("default")} style={{ background: "none", border: "none", color: "#5A58F2", fontSize: 13, fontWeight: 500, cursor: "pointer" }}>Try again</button>
                    </div>
                  )}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<ListingPanel />);
  </script>
</body>
</html>
